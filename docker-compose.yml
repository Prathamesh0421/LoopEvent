services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  pomerium:
    image: pomerium/pomerium:latest
    ports:
      - "8443:8443"
    volumes:
      - ./pomerium/config.yaml:/pomerium/config.yaml:ro
    env_file: .env
    depends_on:
      - frontend
